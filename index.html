<style>

<script>

var G=null,M='local',peer=null,con={},RC='',isH=false,myC=null,pend=[],lastSer='',lastUI='',lastTap=0,destroying=false;

var cv=document.getElementById('cv'),X=cv.getContext('2d'),D=devicePixelRatio||1;cv.width=600*D;cv.height=600*D;X.setTransform(D,0,0,D,0,0);

function c2p(c,r){return{x:PA+c*CS+CS/2,y:PA+r*CS+CS/2}}function tpx(i){return c2p(T[i][0],T[i][1])}
function ppx(co,i){var p=G.pl[co][i];if(p.s==='h')return c2p(HB[co][i][0],HB[co][i][1]);if(p.s==='t')return tpx(p.p);if(p.s==='s')return c2p(HS[co][p.p][0],HS[co][p.p][1]);return{x:300,y:300}}

function cacheBoard(){var cv2=document.createElement('canvas');cv2.width=600*D;cv2.height=600*D;var c=cv2.getContext('2d');c.setTransform(D,0,0,D,0,0);c.fillStyle='#f5f0e0';c.fillRect(0,0,600,600);c.strokeStyle='rgba(0,0,0,.04)';c.lineWidth=.5;for(var i=0;i<=15;i++){c.beginPath();c.moveTo(PA+i*CS,PA);c.lineTo(PA+i*CS,PA+15*CS);c.stroke();c.beginPath();c.moveTo(PA,PA+i*CS);c.lineTo(PA+15*CS,PA+i*CS);c.stroke()}

for(var co in HS)for(var j=0;j<6;j++){var p=HS[co][j];c.fillStyle=PC[co].c;c.globalAlpha=.05+j*.04;c.fillRect(PA+p[0]*CS,PA+p[1]*CS,CS,CS);c.globalAlpha=1}
for(var co in HB){var b=HB[co],x0=PA+Math.min(b[0][0],b[2][0])*CS,y0=PA+Math.min(b[0][1],b[1][1])*CS;c.fillStyle=PC[co].c;c.globalAlpha=.06;c.fillRect(x0-4,y0-4,2*CS+8,2*CS+8);c.globalAlpha=1;c.strokeStyle=PC[co].c;c.lineWidth=1.5;c.globalAlpha=.2;c.strokeRect(x0+2,y0+2,2*CS-4,2*CS-4);c.globalAlpha=1;for(var i=0;i<4;i++){var pp=c2p(b[i][0],b[i][1]);c.beginPath();c.arc(pp.x,pp.y,CS/2-5,0,Math.PI*2);c.strokeStyle=PC[co].c;c.lineWidth=1;c.globalAlpha=.15;c.stroke();c.globalAlpha=1}}
var sq=[[4,4],[4,10],[10,10],[10,4]],sqc=['#8b7030','#307050','#30508b','#8b3030'];c.setLineDash([5,4]);c.lineWidth=2.5;c.lineJoin='round';for(var i=0;i<4;i++){var p1=c2p(sq[i][0],sq[i][1]),p2=c2p(sq[(i+1)%4][0],sq[(i+1)%4][1]);c.strokeStyle=sqc[i];c.globalAlpha=.35;c.beginPath();c.moveTo(p1.x,p1.y);c.lineTo(p2.x,p2.y);c.stroke()}c.setLineDash([]);c.globalAlpha=1;c.lineJoin='miter';c.fillStyle='#5a4830';c.font='14px serif';c.textAlign='center';c.textBaseline='middle';c.fillText('终',PA+7.5*CS,PA+7.5*CS);c.beginPath();c.arc(PA+7.5*CS,PA+7.5*CS,CS*.5,0,Math.PI*2);c.strokeStyle='rgba(0,0,0,.08)';c.lineWidth=1;c.stroke();SF.forEach(function(i){var p=tpx(i);c.fillStyle='#8a6508';c.globalAlpha=.5;c.font='12px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('★',p.x,p.y);c.globalAlpha=1});TR.forEach(function(i){var p=tpx(i);c.fillStyle='#8b3030';c.globalAlpha=.5;c.font='11px sans-serif';c.textAlign='center';c.fillText('⚠',p.x,p.y);c.globalAlpha=1});EX.forEach(function(i){var p=tpx(i);c.fillStyle='#307050';c.globalAlpha=.5;c.font='11px sans-serif';c.textAlign='center';c.fillText('♦',p.x,p.y);c.globalAlpha=1});[{p:10,c:'green'},{p:24,c:'blue'},{p:38,c:'red'},{p:52,c:'yellow'}].forEach(function(s){var pos=tpx(s.p);c.fillStyle=PC[s.c].c;c.globalAlpha=.7;c.font='bold 13px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText('◎',pos.x,pos.y);c.globalAlpha=1});for(var pk in PC){var pos=tpx(PC[pk].st);c.fillStyle=PC[pk].c;c.globalAlpha=.5;c.font='14px sans-serif';c.textAlign='center';c.fillText('✈',pos.x,pos.y);c.globalAlpha=1}return cv2}
var boardCache=cacheBoard();
var dirty=true,rAF=null;function markDirty(){dirty=true;if(!rAF)rAF=requestAnimationFrame(render)}
function render(ts){rAF=null;if(!dirty)return;dirty=false;var anim=false;X.save();X.setTransform(1,0,0,1,0,0);X.drawImage(boardCache,0,0);X.restore();
if(G&&G.trail){var el=Date.now()-G.trail.n;if(el<800){anim=true;X.save();X.strokeStyle=G.trail.c;X.lineWidth=4;X.lineCap='round';X.globalAlpha=.7*(1-el/800);X.beginPath();X.moveTo(G.trail.f.x,G.trail.f.y);X.lineTo(G.trail.t.x,G.trail.t.y);X.stroke();X.globalAlpha=.3*(1-el/800);X.lineWidth=8;X.stroke();X.restore()}else G.trail=null}
if(G){var all=[];for(var ci=0;ci<G.cols.length;ci++){var c=G.cols[ci];for(var i=0;i<4;i++){var p=G.pl[c][i];if(p.s==='f')continue;var pos=ppx(c,i),sel=G.ph==='pick'&&c===curC()&&G.vm.indexOf(i)>=0;all.push({c:c,x:pos.x,y:pos.y,sel:sel})}}var gr={};for(var k=0;k<all.length;k++){var ky=Math.round(all[k].x)+','+Math.round(all[k].y);if(!gr[ky])gr[ky]=[];gr[ky].push(all[k])}for(var ky in gr){var g=gr[ky];for(var k=0;k<g.length;k++){var a=g[k],ox=0,oy=0;if(g.length>1){var ag=(k/g.length)*Math.PI*2-Math.PI/2;ox=Math.cos(ag)*6;oy=Math.sin(ag)*6}var px=a.x+ox,py=a.y+oy;X.save();if(a.sel){anim=true;X.beginPath();X.arc(px,py,14,0,Math.PI*2);X.strokeStyle='rgba(138,101,8,'+(.5+.4*Math.sin(ts/200))+')';X.lineWidth=2;X.stroke()}X.beginPath();X.arc(px,py,CS/2-5,0,Math.PI*2);X.fillStyle=PC[a.c].c;X.fill();X.strokeStyle='rgba(255,255,255,.4)';X.lineWidth=1;X.stroke();X.restore()}}for(var ci=0;ci<G.cols.length;ci++){var c=G.cols[ci],cnt=0;for(var i=0;i<4;i++)if(G.pl[c][i].s==='f')cnt++;if(cnt){var of2={green:[-16,-16],blue:[-16,16],red:[16,16],yellow:[16,-16]}[c];X.fillStyle=PC[c].c;X.font='bold 10px sans-serif';X.textAlign='center';X.fillText(cnt+'✈',300+of2[0],300+of2[1])}}}

for(var bi=0;bi<bubbles.length;bi++){var b=bubbles[bi],age=now-b.t;
if(age<3000){alive.push(b);anim=true;

X.strokeStyle=PC[b.co].c;X.lineWidth=2;

X.fillText(b.msg,b.x,py+ph/2);

if(anim){dirty=true;rAF=requestAnimationFrame(render)}}

function rD(v){document.getElementById('dval').textContent=v||'🎲'}

function IG(cols){var pl={};for(var i=0;i<cols.length;i++){var c=cols[i];pl[c]=[];for(var j=0;j<4;j++)pl[c].push({s:'h',p:0})}G={cols:cols,pl:pl,cur:0,dice:0,ph:'roll',vm:[],c6:0,winner:null,lm:-1,n6:{}};lastUI='';lastSer=''}
